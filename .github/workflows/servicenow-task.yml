name: ServiceNow Task on GitHub Push

on:
  push:
    branches: [main]

jobs:
  create-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify ServiceNow Login
        run: |
          echo "Testing ServiceNow authentication..."
          URL="${{ secrets.SN_INSTANCE_URL }}/api/now/table/task?sysparm_limit=1"
          echo "Using instance: ${{ secrets.SN_INSTANCE_URL }}"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --user "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            --header "Accept: application/json" \
            "$URL")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "401" ]; then
            echo "ERROR: 401 Unauthorized. Check SN_USERNAME and SN_PASSWORD secrets."
            exit 1
          elif [ "$HTTP_STATUS" = "000" ] || [ -z "$HTTP_STATUS" ]; then
            echo "Instance may be hibernating. Proceeding to wake-up step..."
          else
            echo "ServiceNow reachable."
          fi

      - name: Wake ServiceNow Instance
        run: |
          echo "Sending wake-up request..."
          curl -s -L "${{ secrets.SN_INSTANCE_URL }}" > /dev/null
          echo "Wake-up request sent."

      - name: Wait 10 Minutes
        run: |
          echo "Waiting 600 seconds for ServiceNow instance to wake up..."
          sleep 600
          echo "Wait complete."

      - name: Create Task in ServiceNow
        run: |
          PAYLOAD='{
            "short_description": "GitHub Commit by ${{ github.actor }} on repo vkhere/Project-2",
            "description": "Commit Details:\n- Author: ${{ github.actor }}\n- Branch: ${{ github.ref_name }}\n- Commit SHA: ${{ github.sha }}\n- Message: ${{ github.event.head_commit.message }}\n- Timestamp: ${{ github.event.head_commit.timestamp }}\n- Repo: https://github.com/vkhere/Project-2",
            "state": "1"
          }'

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SN_INSTANCE_URL }}/api/now/table/task" \
            --user "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "$PAYLOAD")

          STATUS=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $STATUS"
          echo "Response Body: $BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "ERROR: Task creation failed."
            exit 1
          fi

          echo "SUCCESS: Task created in ServiceNow."
