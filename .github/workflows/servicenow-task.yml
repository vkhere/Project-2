name: ServiceNow Task on GitHub Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          MISSING=0

          if [ -z "${{ secrets.SN_INSTANCE_URL }}" ]; then
            echo "ERROR: SN_INSTANCE_URL is missing"
            MISSING=1
          fi
          if [ -z "${{ secrets.SN_USERNAME }}" ]; then
            echo "ERROR: SN_USERNAME is missing"
            MISSING=1
          fi
          if [ -z "${{ secrets.SN_PASSWORD }}" ]; then
            echo "ERROR: SN_PASSWORD is missing"
            MISSING=1
          fi
          if [ -z "${{ secrets.SNW_URL }}" ]; then
            echo "ERROR: SNW_URL is missing"
            MISSING=1
          fi
          if [ -z "${{ secrets.SNW_username }}" ]; then
            echo "ERROR: SNW_username is missing"
            MISSING=1
          fi
          if [ -z "${{ secrets.SNW_Password }}" ]; then
            echo "ERROR: SNW_Password is missing"
            MISSING=1
          fi

          if [ "$MISSING" = "1" ]; then
            echo "One or more required secrets are missing. Aborting."
            exit 1
          fi

          echo "All 6 required secrets are present."

      - name: Login to ServiceNow Website to Wake Up Instance
        run: |
          echo "Logging into ServiceNow website at SNW_URL..."

          curl -s -c cookies.txt -o /dev/null -L "${{ secrets.SNW_URL }}"
          echo "Step 1 done: Retrieved login page and saved cookies."

          HTTP_STATUS=$(curl -s -o login_response.html -w "%{http_code}" \
            -c cookies.txt -b cookies.txt \
            -L \
            --data "user_name=${{ secrets.SNW_username }}" \
            --data "user_password=${{ secrets.SNW_Password }}" \
            --data "ni.nolog.user_password=true" \
            --data "ni.noecho.user_name=true" \
            --data "ni.noecho.user_password=true" \
            --data "remember_me=true" \
            --data "sys_action=sysverb_login" \
            "${{ secrets.SNW_URL }}/login.do")

          echo "Login HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "Login to SNW_URL successful."
          else
            echo "WARNING: Unexpected login status: $HTTP_STATUS. Continuing anyway."
          fi

      - name: Wake ServiceNow Developer Instance via HTTP Request
        run: |
          echo "Sending wake-up request to SN_INSTANCE_URL..."
          curl -s -L -o /dev/null "${{ secrets.SN_INSTANCE_URL }}"
          echo "Wake-up request sent."

      - name: Wait 10 Minutes for Instance to Boot
        run: |
          echo "Waiting 600 seconds for ServiceNow developer instance to fully wake up..."
          sleep 600
          echo "Wait complete. Proceeding to API operations."

      - name: Verify ServiceNow API Login
        run: |
          echo "Verifying REST API authentication against SN_INSTANCE_URL..."
          URL="${{ secrets.SN_INSTANCE_URL }}/api/now/table/task?sysparm_limit=1"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --user "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            --header "Accept: application/json" \
            "$URL")

          echo "API Auth HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "401" ]; then
            echo "ERROR: 401 Unauthorized. Check SN_USERNAME and SN_PASSWORD secrets."
            exit 1
          elif [ "$HTTP_STATUS" = "000" ]; then
            echo "WARNING: Instance not responding yet."
          else
            echo "ServiceNow API reachable. Status: $HTTP_STATUS"
          fi

      - name: Create Task in ServiceNow
        run: |
          PAYLOAD=$(printf '{
            "short_description": "GitHub Commit by %s on repo vkhere/Project-2",
            "description": "Commit Details:\n- Author: %s\n- Branch: %s\n- Commit SHA: %s\n- Message: %s\n- Timestamp: %s\n- Repository: https://github.com/vkhere/Project-2",
            "state": "1"
          }' \
            "${{ github.actor }}" \
            "${{ github.actor }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.event.head_commit.message }}" \
            "${{ github.event.head_commit.timestamp }}")

          # POST to ServiceNow and save ONLY the body to task_response.json
          curl -s -L --post302 -X POST \
            "${{ secrets.SN_INSTANCE_URL }}/api/now/table/task" \
            --user "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --output task_response.json \
            --write-out "HTTP_STATUS:%{http_code}\n" \
            --data "$PAYLOAD" | tee curl_status.txt

          HTTP_STATUS=$(grep "HTTP_STATUS:" curl_status.txt | cut -d':' -f2 | tr -d '[:space:]')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Raw Response:"
          cat task_response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Failed to create task. Status: $HTTP_STATUS"
            exit 1
          fi

          echo "SUCCESS: Task created in ServiceNow!"

      - name: Display Created Task Summary
        run: |
          echo ""
          echo "=============================================="
          echo "      SERVICENOW TASK CREATED SUMMARY"
          echo "=============================================="

          python3 << 'EOF'
          import json, sys

          try:
              with open("task_response.json", "r") as f:
                  content = f.read().strip()

              if not content:
                  print("WARNING: Response file is empty.")
                  sys.exit(1)

              data = json.loads(content)
              result = data.get("result", {})

              task_number   = result.get("number", "N/A")
              task_sysid    = result.get("sys_id", "N/A")
              task_desc     = result.get("short_description", "N/A")
              task_state    = result.get("state", "N/A")
              task_created  = result.get("sys_created_on", "N/A")
              task_priority = result.get("priority", "N/A")

              print(f"  Task Number   : {task_number}")
              print(f"  Task Sys ID   : {task_sysid}")
              print(f"  Description   : {task_desc}")
              print(f"  State         : {task_state} (1 = Open)")
              print(f"  Priority      : {task_priority}")
              print(f"  Created On    : {task_created}")
              print(f"  Direct Link   : ${{ secrets.SN_INSTANCE_URL }}/nav_to.do?uri=task.do?sys_id={task_sysid}")

          except json.JSONDecodeError as e:
              print(f"ERROR: Could not parse JSON response: {e}")
              print("Raw content was:")
              with open("task_response.json", "r") as f:
                  print(f.read())
              sys.exit(1)
          EOF

          echo ""
          echo "  Commit SHA    : ${{ github.sha }}"
          echo "  Branch        : ${{ github.ref_name }}"
          echo "  Author        : ${{ github.actor }}"
          echo "  Repository    : https://github.com/vkhere/Project-2"
          echo ""
          echo "=============================================="
          echo "        Workflow completed successfully!"
          echo "=============================================="
