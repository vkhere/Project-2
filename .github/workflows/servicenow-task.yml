# ============================================================
# FILE: .github/workflows/servicenow-task.yml
# PURPOSE: On every push to this repo, automatically create
#          a Task in ServiceNow with the commit details.
# ============================================================

name: ServiceNow Task on GitHub Push

# ---------------------------------------------------------
# STEP 1 — TRIGGER
# This workflow runs automatically whenever a push is made
# to the 'main' branch. Change 'main' to your branch name,
# or remove the 'branches' line to trigger on ALL branches.
# ---------------------------------------------------------
on:
  push:
    branches:
      - main

jobs:
  create-servicenow-task:
    name: Create Task in ServiceNow
    runs-on: ubuntu-latest  # GitHub-hosted Linux runner

    steps:

      # ---------------------------------------------------------
      # Always check out the code first so we can read
      # commit context variables like author, message, SHA, etc.
      # ---------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # STEP 2 — LOGIN / VERIFY SERVICENOW AUTHENTICATION
      # We use Basic Auth (username:password) with curl.
      # Credentials are stored safely as GitHub Secrets — never
      # written directly in this file.
      # This step calls the ServiceNow /api/now/table/task
      # endpoint with a GET request just to verify credentials.
      # A 200 or 401 response tells us if the instance is awake.
      # ---------------------------------------------------------
      - name: Verify ServiceNow Login
        run: |
          echo "Testing ServiceNow authentication..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --user "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            --header "Accept: application/json" \
            "${{ secrets.SN_INSTANCE_URL }}/api/now/table/task?sysparm_limit=1")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" == "000" ]; then
            echo "Instance is hibernating. Proceeding to wake-up step..."
          elif [ "$HTTP_STATUS" == "401" ]; then
            echo "ERROR: Invalid credentials. Check SN_USERNAME and SN_PASSWORD secrets."
            exit 1
          else
            echo "Instance is reachable. HTTP Status: $HTTP_STATUS"
          fi

      # ---------------------------------------------------------
      # STEP 3A — WAKE UP THE SERVICENOW INSTANCE
      # ServiceNow Developer Instances (PDI) go into hibernation.
      # A simple HTTP GET to the base URL wakes it up.
      # We use -L to follow redirects and -s for silent mode.
      # ---------------------------------------------------------
      - name: Wake Up ServiceNow Instance
        run: |
          echo "Sending wake-up request to ServiceNow instance..."
          curl -s -o /dev/null -L "${{ secrets.SN_INSTANCE_URL }}"
          echo "Wake-up request sent!"

      # ---------------------------------------------------------
      # STEP 3B — WAIT 10 MINUTES
      # PDIs can take up to 10 minutes to fully wake from sleep.
      # 'sleep 600' pauses the workflow for exactly 600 seconds.
      # ---------------------------------------------------------
      - name: Wait 10 Minutes for Instance to Wake Up
        run: |
          echo "Waiting 600 seconds (10 minutes) for ServiceNow to wake up..."
          sleep 600
          echo "Wait complete. Proceeding to create Task..."

      # ---------------------------------------------------------
      # STEP 4 — CREATE A TASK IN SERVICENOW
      # We use the ServiceNow Table REST API to POST a new task.
      # All commit details come from GitHub's built-in variables:
      #   github.actor        → who made the commit
      #   github.event.head_commit.message → commit message
      #   github.sha          → full commit SHA (unique ID)
      #   github.ref_name     → branch name
      #   github.event.head_commit.timestamp → date/time
      # ---------------------------------------------------------
      - name: Create Task in ServiceNow
        run: |
          # Build the JSON payload using commit context variables
          PAYLOAD=$(cat <<EOF
          {
            "short_description": "GitHub Commit by ${{ github.actor }} on repo vkhere/Project-2",
            "description": "Commit Details:\n- Author: ${{ github.actor }}\n- Branch: ${{ github.ref_name }}\n- Commit SHA: ${{ github.sha }}\n- Message: ${{ github.event.head_commit.message }}\n- Timestamp: ${{ github.event.head_commit.timestamp }}",
            "state": "1",
            "priority": "3",
            "comments": "Automatically created by GitHub Actions on push to vkhere/Project-2"
          }
          EOF
          )

          echo "Sending Task creation request to ServiceNow..."

          # Make the POST request and capture the HTTP status code
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SN_INSTANCE_URL }}/api/now/table/task" \
            --user "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data "$PAYLOAD")

          # Split response body and status code
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

          echo "HTTP Status Code: $HTTP_STATUS"
          echo "Response Body: $HTTP_BODY"

          # Error handling: fail the job if status is not 2xx
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "ERROR: ServiceNow Task creation failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "SUCCESS: Task created in ServiceNow!"
          # Extract and display the Task number from response
          echo "$HTTP_BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          task_num = data.get('result', {}).get('number', 'N/A')
          task_sys_id = data.get('result', {}).get('sys_id', 'N/A')
          print(f'Task Number: {task_num}')
          print(f'Task SysID:  {task_sys_id}')
          "
